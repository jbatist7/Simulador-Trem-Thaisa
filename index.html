```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thaisa Travel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--gold:#ffd700;
--dark:#142030;
--glass:rgba(255,255,255,0.1);
--blur:blur(10px);
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:system-ui,-apple-system;
background:#1e3c72;
color:#fff;
height:100dvh;
display:grid;
grid-template-rows:auto 1fr auto;
overflow:hidden;
}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
z-index:20;
}

.logo{
font-weight:700;
letter-spacing:.5px;
}

.logo span{color:var(--gold);}

.menu-btn{
background:var(--glass);
border:none;
border-radius:50%;
width:38px;height:38px;
color:#fff;
}

/* ===== MAP ===== */
#map{
width:100%;
height:100%;
}

/* ===== CONTROLES MAPA ===== */
.map-controls{
position:absolute;
right:12px;
bottom:160px;
display:flex;
gap:8px;
flex-direction:column;
z-index:10;
}

.control-btn{
width:42px;height:42px;
border-radius:50%;
border:none;
background:#fff;
color:#1e3c72;
}

/* ===== OVERLAY ===== */
.overlay{
position:absolute;
bottom:200px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.7);
padding:10px 18px;
border-radius:30px;
font-size:14px;
backdrop-filter:var(--blur);
opacity:0;
transition:.4s;
z-index:15;
}

.overlay.show{opacity:1;}

/* ===== BOTTOM ===== */
.bottom{
background:rgba(20,30,48,.92);
backdrop-filter:var(--blur);
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
z-index:25;
}

/* ===== PROGRESS ===== */
.progress{
display:flex;
align-items:center;
gap:8px;
}

.track{
flex:1;
height:6px;
background:rgba(255,255,255,.2);
border-radius:4px;
position:relative;
}

.fill{
height:100%;
width:0%;
background:var(--gold);
border-radius:4px;
}

/* ===== INFO ===== */
.info{
display:flex;
gap:12px;
overflow:auto;
font-size:12px;
}

.info div{white-space:nowrap;opacity:.9;}

/* ===== SPEED ===== */
.speed{
display:flex;
align-items:center;
gap:8px;
}

.speed strong{color:var(--gold);}

input[type=range]{
flex:1;
}

.play{
background:var(--gold);
border:none;
border-radius:8px;
padding:6px 14px;
}

/* ===== SIDEBAR ===== */
.sidebar{
position:fixed;
top:0;
right:-100%;
width:100%;
height:100%;
background:#182536;
padding:20px;
transition:.3s;
overflow:auto;
z-index:50;
}

.sidebar.open{right:0;}

select{
width:100%;
padding:10px;
background:#0f1924;
color:#fff;
border:none;
}

/* ===== RESPONSIVO ===== */
@media(min-width:700px){

body{
grid-template-columns:1fr 340px;
grid-template-rows:auto 1fr auto;
}

.sidebar{
width:340px;
}

.info{
justify-content:space-between;
}

.map-controls{
bottom:180px;
}

}

</style>
</head>

<body>

<header>
<button class="menu-btn" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<div class="logo">Thaisa <span>Travel</span></div>
<div id="date"></div>
</header>

<div id="map"></div>

<div class="map-controls">
<button class="control-btn" onclick="map.zoomIn()"><i class="fas fa-plus"></i></button>
<button class="control-btn" onclick="map.zoomOut()"><i class="fas fa-minus"></i></button>
</div>

<div class="overlay" id="overlay">Paisagem incrível!</div>

<div class="bottom">

<div class="progress">
<span id="percent">0%</span>
<div class="track"><div class="fill" id="fill"></div></div>
<span id="time">--</span>
</div>

<div class="info">
<div id="origin">Origem</div>
<div id="dest">Destino</div>
<div id="dist">0 km</div>
</div>

<div class="speed">
<i class="fas fa-train"></i>
<strong><span id="speed">120</span> km/h</strong>
<input type="range" min="40" max="800" value="120" id="slider">
<button class="play" onclick="togglePlay()" id="play">
<i class="fas fa-play"></i>
</button>
</div>

</div>

<div class="sidebar" id="sidebar">

<h3>Escolher rota</h3>
<select id="routes">
<option value="trans">Trans-Siberiana</option>
<option value="shinkansen">Shinkansen</option>
<option value="orient">Orient Express</option>
</select>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map('map',{zoomControl:false}).setView([0,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker=L.circleMarker([0,0],{radius:8,color:"#fff",fillColor:"#ffd700",fillOpacity:1}).addTo(map);

let playing=false;
let pos=0;
let speed=120;

slider.oninput=e=>{
speed=e.target.value;
document.getElementById("speed").textContent=speed;
};

function togglePlay(){
playing=!playing;
document.getElementById("play").innerHTML=
playing?'<i class="fas fa-pause"></i>':'<i class="fas fa-play"></i>';
animate();
}

function animate(){
if(!playing)return;
pos+=speed*0.00001;

marker.setLatLng([pos*30,pos*60]);

document.getElementById("fill").style.width=(pos*100)%+"%";
document.getElementById("percent").textContent=(pos*100).toFixed(1)+"%";

requestAnimationFrame(animate);
}

function toggleSidebar(){
sidebar.classList.toggle("open");
}

document.getElementById("date").textContent=
new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
</script>

</body>
</html>
```
