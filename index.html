<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaje com Thaisa</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --primary-dark: #e6c200;
            --bg-dark: rgba(20, 30, 48, 0.95);
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Lato', sans-serif;
            background: #1e3c72;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
        }
        .header-content { pointer-events: auto; display: flex; align-items: center; gap: 10px; }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; 
            color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2; text-align: left;
        }
        .logo span { color: var(--primary); display: block; font-size: 0.9em; font-weight: 400; }

        .menu-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: all 0.3s; flex-shrink: 0;
        }
        .menu-btn:hover { background: var(--primary); color: #000; }

        /* --- Map Container --- */
        #map { flex: 1; width: 100%; height: 100%; z-index: 1; background: #1e3c72; }

        /* --- Map Controls (Right Column) --- */
        .map-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 900;
            align-items: center;
        }

        /* Botões padrão do mapa */
        .control-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.95); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #1e3c72; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .control-btn:hover { background: #fff; transform: scale(1.1); color: var(--primary); }
        .control-btn.active { background: var(--primary); color: #1e3c72; }

        /* --- Mobile Vertical Speed Control (Escondido no Desktop) --- */
        .mobile-speed-control {
            display: none; /* Padrão oculto */
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.5);
            padding: 10px 5px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .v-speed-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .v-speed-btn:active { background: var(--primary); color: #000; }
        .v-speed-display {
            font-family: 'Playfair Display', serif;
            font-size: 16px; font-weight: bold; color: var(--primary);
            text-align: center; line-height: 1;
        }

        /* --- Bottom Bar --- */
        .bottom-bar {
            background: var(--bg-dark);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px 15px 20px;
            z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        /* Progress Bar (Arrastável) */
        .progress-container {
            width: 100%; display: flex; align-items: center; gap: 10px;
        }
        .time-info { font-size: 11px; color: rgba(255,255,255,0.8); min-width: 50px; text-align: center; white-space: nowrap; }
        
        /* Input Range Estilizado */
        input[type=range].progress-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range].progress-slider:focus { outline: none; }
        
        /* Trilha (Webkit) */
        input[type=range].progress-slider::-webkit-slider-runnable-track {
            width: 100%; height: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            /* O preenchimento dourado é feito via JS (background-size) */
            background-image: linear-gradient(var(--primary), var(--primary));
            background-size: 0% 100%;
            background-repeat: no-repeat;
        }
        /* Trilha (Firefox) */
        input[type=range].progress-slider::-moz-range-track {
            width: 100%; height: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        /* Thumb (Bolinha - Webkit) */
        input[type=range].progress-slider::-webkit-slider-thumb {
            height: 20px; width: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px; /* Alinhar verticalmente */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        /* Thumb (Firefox) */
        input[type=range].progress-slider::-moz-range-thumb {
            height: 20px; width: 20px;
            border: none;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 5px;
        }
        .info-item { display: flex; flex-direction: column; align-items: center; text-align: center;}
        .info-label { font-size: 9px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
        .info-value { font-size: 12px; font-weight: 700; color: #fff; }
        .weather-badge { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 15px; display: flex; align-items: center; gap: 5px; font-size: 12px; }

        /* --- Desktop Bottom Controls (Slider + Play) --- */
        .desktop-bottom-controls {
            display: flex; align-items: center; gap: 15px;
        }
        .desktop-speed-wrapper {
            flex: 1; display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 10px;
        }
        .desktop-speed-display { 
            font-size: 18px; font-weight: 700; color: var(--primary); 
            font-family: 'Playfair Display', serif; min-width: 70px; text-align: center;
        }
        .desktop-btn-play {
            flex: 0 0 auto; padding: 10px 25px; border-radius: 8px;
            background: var(--primary); color: #1e3c72; border: none;
            font-weight: bold; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        .desktop-btn-play:hover { transform: scale(1.05); filter: brightness(1.1); }
        .desktop-btn-play.playing { background: #ff4757; color: white; }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: rgba(30, 40, 60, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: right 0.3s ease-in-out; padding: 20px;
            overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }
        .sidebar.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .close-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        
        .control-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        .group-title { font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom: 12px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        
        select { width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; margin-bottom: 10px; }
        
        /* --- Responsividade --- */
        
        /* Estilos Geral para Input Range de Velocidade (Desktop) */
        input[type="range"].speed-slider {
            flex: 1; height: 6px; background: rgba(255,255,255,0.2);
            border-radius: 3px; outline: none; -webkit-appearance: none;
        }
        input[type="range"].speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            border-radius: 50%; background: var(--primary); cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* --- CELULAR (< 600px) --- */
        @media (max-width: 600px) {
            .sidebar { width: 100%; right: -100%; }
            .logo { font-size: 13px; max-width: 200px; }
            
            /* Esconder controles Desktop */
            .desktop-bottom-controls { display: none !important; }
            
            /* Mostrar Controle Vertical Móvel */
            .mobile-speed-control { display: flex; }
            
            /* Grid vira scroll horizontal */
            .info-grid {
                display: flex; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; gap: 15px;
            }
            .info-grid::-webkit-scrollbar { display: none; }
            .info-item { min-width: 80px; align-items: flex-start; }

            /* Botões do mapa ficam levemente menores e sobem um pouco para dar espaço ao controle vertical */
            .map-controls { bottom: 30vh; top: auto; transform: none; gap: 8px; }
            .control-btn { width: 40px; height: 40px; font-size: 16px; }

            /* Ajuste do slider de progresso para dedo */
            input[type=range].progress-slider::-webkit-slider-thumb { height: 24px; width: 24px; margin-top: -8px; }
            input[type=range].progress-slider::-webkit-slider-runnable-track { height: 10px; }
        }

        /* --- NOTEBOOK (> 600px) --- */
        @media (min-width: 601px) {
            /* No desktop, escondemos o controle vertical da coluna */
            .mobile-speed-control { display: none !important; }
            
            /* Mostramos os controles na barra de baixo */
            .desktop-bottom-controls { display: flex !important; }
        }

        /* Scenery Overlay */
        .scenery-overlay {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            padding: 8px 20px; border-radius: 20px; font-family: 'Playfair Display', serif;
            font-size: 14px; z-index: 950; opacity: 0; transition: opacity 1s;
            pointer-events: none; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .scenery-overlay.show { opacity: 1; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                Clique no menu para escolher a rota
                <span>- Viaje com Thaisa</span>
            </div>
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Map Controls (Direita) -->
    <div class="map-controls">
        <button class="control-btn" onclick="changeZoom('in')" title="Aproximar"><i class="fas fa-plus"></i></button>
        <button class="control-btn" onclick="changeZoom('out')" title="Afastar"><i class="fas fa-minus"></i></button>
        <button class="control-btn" onclick="resetView()" title="Visão Global"><i class="fas fa-globe"></i></button>
        <button class="control-btn" onclick="toggleSatellite()" title="Satélite" id="btnSatellite"><i class="fas fa-satellite"></i></button>
        <button class="control-btn" onclick="toggleCabin()" title="Vista Cabine" id="btnCabin"><i class="fas fa-train"></i></button>
        
        <!-- Botão Play Mobile (Só aparece no mobile via CSS se necessário, mas aqui deixaremos visível em ambos para ser o 'principal' da coluna) -->
        <!-- Nota: O usuário pediu Play na barra de velocidade no Notebook. Aqui é o botão da coluna lateral. -->
        <!-- Vamos manter este botão visível no Mobile, mas no Notebook o foco será o da barra inferior. -->
        <button class="control-btn mobile-play-btn" onclick="togglePlay()" title="Iniciar/Pausar" style="display: none;"> <!-- Oculto via JS/CSS dependendo da lógica preferida, mas vamos usar o da barra inferior para notebook -->
             <i class="fas fa-play"></i>
        </button>

        <!-- CONTROLE VERTICAL DE VELOCIDADE (MOBILE) -->
        <div class="mobile-speed-control">
            <button class="v-speed-btn" onclick="adjustSpeed(10)"><i class="fas fa-plus"></i></button>
            <div class="v-speed-display" id="mobileSpeedValue">120</div>
            <button class="v-speed-btn" onclick="adjustSpeed(-10)"><i class="fas fa-minus"></i></button>
        </div>
    </div>

    <!-- Scenery Overlay -->
    <div class="scenery-overlay" id="sceneryOverlay">
        <i class="fas fa-mountain" id="sceneryIcon"></i>
        <span id="sceneryText">Atravessando os Montes Urais</span>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <!-- Progress Section (Arrastável) -->
        <div class="progress-container">
            <div class="time-info" id="progressPercent">0%</div>
            <input type="range" class="progress-slider" id="progressBar" min="0" max="100" value="0" step="0.1">
            <div class="time-info" id="timeRemaining">--:--</div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
            <div class="info-item"><span class="info-label">Origem</span><span class="info-value" id="bottomOrigin">Moscou</span></div>
            <div class="info-item"><span class="info-label">Destino</span><span class="info-value" id="bottomDest">Vladivostok</span></div>
            <div class="info-item"><span class="info-label">Distância</span><span class="info-value" id="bottomDist">9.289 km</span></div>
            <div class="info-item"><span class="info-label">Tempo</span><span class="info-value" id="bottomTime">7 dias</span></div>
            <div class="info-item">
                <div class="weather-badge">
                    <span id="bottomWeatherIcon">❄️</span>
                    <span id="bottomTemp">-15°C</span>
                </div>
            </div>
        </div>

        <!-- DESKTOP CONTROLS (Velocidade + Play) -->
        <div class="desktop-bottom-controls">
            <div class="desktop-speed-wrapper">
                <i class="fas fa-tachometer-alt" style="color:var(--primary)"></i>
                <div class="desktop-speed-display"><span id="desktopSpeedValue">120</span> <span style="font-size:12px">km/h</span></div>
                <input type="range" class="speed-slider" id="speedSlider" min="40" max="800" value="120" step="10">
            </div>
            <button class="desktop-btn-play" id="desktopPlayBtn" onclick="togglePlay()">
                <i class="fas fa-play"></i>
            </button>
        </div>
    </div>

    <!-- Sidebar Settings -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="font-family: 'Playfair Display';">Configurações</h2>
            <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="control-group">
            <div class="group-title"><i class="fas fa-map-marked-alt"></i> Escolher Rota</div>
            <select id="routeSelect">
                <optgroup label="🌏 Ásia">
                    <option value="trans-siberian">Trans-Siberiana (Rússia)</option>
                    <option value="shinkansen">Shinkansen (Japão)</option>
                </optgroup>
                <optgroup label="🌍 Europa">
                    <option value="orient-express">Orient Express (Europa)</option>
                    <option value="glacier-express">Glacier Express (Suíça)</option>
                </optgroup>
                <optgroup label="🌎 Américas">
                    <option value="california-zephyr">California Zephyr (EUA)</option>
                    <option value="canadian">The Canadian (Canadá)</option>
                    <option value="tren-a-la-nube">Tren a las Nubes (Argentina)</option>
                    <option value="serra-verde">Serra Verde (Brasil)</option>
                    <option value="tren-maya">Tren Maya (México)</option>
                </optgroup>
            </select>
        </div>
        <div class="control-group">
            <div class="group-title"><i class="fas fa-cog"></i> Modo de Viagem</div>
            <div class="play-control">
                <button class="btn-main btn-secondary" id="continuousBtn" onclick="toggleContinuous()" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer;">
                    <i class="fas fa-infinity"></i> Contínuo
                </button>
            </div>
        </div>
        <div class="control-group">
            <div class="group-title"><i class="fas fa-save"></i> Minhas Viagens</div>
            <button class="btn-main btn-secondary" style="width:100%; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer;" onclick="saveTrip()">
                <i class="fas fa-download"></i> Salvar Progresso
            </button>
            <div class="saved-trips-list" id="savedTripsList"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- Database de Rotas (Mesmas coordenadas realistas) ---
        const routes = {
            'trans-siberian': {
                name: 'Trans-Siberiana', origin: 'Moscou', destination: 'Vladivostok',
                distance: 9289, duration: '7 dias',
                coordinates: [[55.7558, 37.6173], [56.3267, 44.0066], [55.8304, 49.0661], [56.8389, 60.6057], [55.0084, 82.9357], [56.0153, 92.8932], [51.8335, 107.5845], [43.1155, 131.8855]],
                weather: { icon: '❄️', text: 'Neve', temp: '-15°C' },
                scenery: [{ lat: 56.8, text: 'Montes Urais', icon: 'fa-mountain' }, { lat: 55.0, text: 'Sibéria', icon: 'fa-tree' }]
            },
            'shinkansen': {
                name: 'Shinkansen', origin: 'Tóquio', destination: 'Osaka',
                distance: 515, duration: '2h 30min',
                coordinates: [[35.6762, 139.6503], [35.6895, 139.6917], [35.8617, 139.6455], [35.1689, 136.8816], [34.9858, 135.7588], [34.6937, 135.5023]],
                weather: { icon: '🌸', text: 'Primavera', temp: '18°C' },
                scenery: [{ lat: 35.2, text: 'Monte Fuji', icon: 'fa-mountain' }]
            },
            'orient-express': {
                name: 'Orient Express', origin: 'Paris', destination: 'Istambul',
                distance: 3000, duration: '3 dias',
                coordinates: [[48.8566, 2.3522], [46.2044, 6.1432], [47.3769, 8.5417], [48.2082, 16.3738], [41.0082, 28.9784]],
                weather: { icon: '🌤️', text: 'Nublado', temp: '12°C' },
                scenery: [{ lat: 47.3, text: 'Alpes Suíços', icon: 'fa-mountain' }]
            },
            'glacier-express': {
                name: 'Glacier Express', origin: 'Zermatt', destination: 'St. Moritz',
                distance: 291, duration: '8 horas',
                coordinates: [[46.0207, 7.7491], [46.4900, 8.0300], [46.6167, 8.3667], [46.7900, 9.5800], [46.4940, 9.8440], [46.6569, 9.8355]],
                weather: { icon: '⛷️', text: 'Neve', temp: '-5°C' },
                scenery: [{ lat: 46.6, text: 'Passo de Oberalp', icon: 'fa-mountain' }]
            },
            'california-zephyr': {
                name: 'California Zephyr', origin: 'Chicago', destination: 'San Francisco',
                distance: 3924, duration: '3 dias',
                coordinates: [[41.8781, -87.6298], [41.2524, -95.9980], [40.7608, -111.8910], [39.7392, -104.9903], [37.7749, -122.4194]],
                weather: { icon: '☀️', text: 'Sol', temp: '22°C' },
                scenery: [{ lat: 40.0, text: 'Rocky Mountains', icon: 'fa-mountain' }]
            },
            'canadian': {
                name: 'The Canadian', origin: 'Toronto', destination: 'Vancouver',
                distance: 4466, duration: '4 dias',
                coordinates: [[43.6532, -79.3832], [43.6650, -79.3830], [49.8951, -97.1384], [53.5461, -113.4938], [49.2827, -123.1207]],
                weather: { icon: '🍁', text: 'Outono', temp: '8°C' },
                scenery: [{ lat: 52.0, text: 'Canadian Rockies', icon: 'fa-mountain' }]
            },
            'tren-a-la-nube': {
                name: 'Tren a las Nubes', origin: 'Salta', destination: 'San Antonio',
                distance: 434, duration: '15 horas',
                coordinates: [[-24.7859, -65.4117], [-24.3000, -65.8000], [-24.2333, -66.3000], [-24.0833, -66.8333]],
                weather: { icon: '☀️', text: 'Céu Limpo', temp: '5°C' },
                scenery: [{ lat: -24.2, text: 'Viaduto La Polvorilla', icon: 'fa-archway' }]
            },
            'serra-verde': {
                name: 'Serra Verde', origin: 'Curitiba', destination: 'Morretes',
                distance: 110, duration: '3 horas',
                coordinates: [[-25.4284, -49.2733], [-25.4500, -49.0500], [-25.5000, -48.9000], [-25.5400, -48.7889]],
                weather: { icon: '🌧️', text: 'Chuva', temp: '16°C' },
                scenery: [{ lat: -25.48, text: 'Serra do Mar', icon: 'fa-tree' }]
            },
            'tren-maya': {
                name: 'Tren Maya', origin: 'Cancún', destination: 'Palenque',
                distance: 1500, duration: '8 horas',
                coordinates: [[21.1619, -86.8515], [20.9674, -89.5926], [20.2124, -89.5550], [18.5397, -92.4707]],
                weather: { icon: '🌴', text: 'Tropical', temp: '28°C' },
                scenery: [{ lat: 20.0, text: 'Selva Maya', icon: 'fa-tree' }]
            }
        };

        // --- Variáveis de Estado ---
        let map, trainMarker, routeLine, satelliteLayer;
        let currentRouteKey = 'trans-siberian';
        let currentRoute = routes[currentRouteKey];
        let isPlaying = false;
        let isContinuous = false;
        let currentSpeed = 120;
        let currentPosition = 0;
        let elapsedTime = 0;
        let animationId;
        let currentZoomLevel = 'route';

        // --- Inicialização ---
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            setupListeners();
            loadRoute('trans-siberian');
            renderSavedTrips();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri' });
        }

        function setupListeners() {
            document.getElementById('routeSelect').addEventListener('change', (e) => {
                loadRoute(e.target.value);
                if(window.innerWidth < 600) toggleSidebar();
            });

            // Slider Desktop
            const slider = document.getElementById('speedSlider');
            slider.addEventListener('input', (e) => {
                currentSpeed = parseInt(e.target.value);
                updateSpeedDisplay();
            });

            // Progress Bar (Input Range) - Dragging Logic
            const progressBar = document.getElementById('progressBar');
            progressBar.addEventListener('input', (e) => {
                const percent = parseFloat(e.target.value);
                jumpToPosition(percent / 100);
            });
        }

        function updateSpeedDisplay() {
            // Atualiza tanto mobile quanto desktop
            document.getElementById('mobileSpeedValue').textContent = currentSpeed;
            document.getElementById('desktopSpeedValue').textContent = currentSpeed;
            document.getElementById('speedSlider').value = currentSpeed;
            updateTimeDisplay();
        }

        // Função para botões + e - do Mobile
        function adjustSpeed(amount) {
            currentSpeed += amount;
            if(currentSpeed < 40) currentSpeed = 40;
            if(currentSpeed > 800) currentSpeed = 800;
            updateSpeedDisplay();
        }

        function loadRoute(key, savedData = null) {
            currentRouteKey = key;
            currentRoute = routes[key];
            
            if (savedData) {
                currentPosition = savedData.position;
                currentSpeed = savedData.speed;
            } else {
                currentPosition = 0;
                elapsedTime = 0;
                currentSpeed = 120;
            }

            // Resetar Play
            isPlaying = false;
            updatePlayButtonUI();

            updateSpeedDisplay();

            // Atualizar UI
            document.getElementById('bottomOrigin').textContent = currentRoute.origin;
            document.getElementById('bottomDest').textContent = currentRoute.destination;
            document.getElementById('bottomDist').textContent = currentRoute.distance.toLocaleString('pt-BR') + ' km';
            document.getElementById('bottomTime').textContent = currentRoute.duration;
            document.getElementById('bottomWeatherIcon').textContent = currentRoute.weather.icon;
            document.getElementById('bottomTemp').textContent = currentRoute.weather.temp;

            // Atualizar Mapa
            if (routeLine) map.removeLayer(routeLine);
            if (trainMarker) map.removeLayer(trainMarker);

            const latlngs = currentRoute.coordinates;
            routeLine = L.polyline(latlngs, { color: '#ffd700', weight: 5, opacity: 0.9, smoothFactor: 1 }).addTo(map);
            trainMarker = L.circleMarker(latlngs[0], { radius: 8, fillColor: '#ffd700', color: '#fff', weight: 3, fillOpacity: 1 }).addTo(map);

            resetView();
            updateTrainVisuals();
        }

        function updateTrainVisuals() {
            const totalDist = currentRoute.distance;
            const percent = Math.min(currentPosition / totalDist, 1);
            const coords = currentRoute.coordinates;
            let accumulatedDist = 0;
            let startIdx = 0;

            for(let i=0; i<coords.length-1; i++) {
                const d = map.distance(coords[i], coords[i+1]) / 1000;
                if(accumulatedDist + d >= currentPosition) {
                    startIdx = i;
                    break;
                }
                accumulatedDist += d;
            }

            const p1 = coords[startIdx];
            const p2 = coords[Math.min(startIdx+1, coords.length-1)];
            const segmentDist = map.distance(p1, p2) / 1000;
            const segmentProgress = (currentPosition - accumulatedDist) / segmentDist;

            const lat = p1[0] + (p2[0] - p1[0]) * Math.min(segmentProgress, 1);
            const lng = p1[1] + (p2[1] - p1[1]) * Math.min(segmentProgress, 1);

            trainMarker.setLatLng([lat, lng]);

            // Atualizar Progress Bar (Input value e Background Gradient)
            const percentVal = (percent * 100).toFixed(1);
            const progressBar = document.getElementById('progressBar');
            progressBar.value = percentVal;
            // Truque CSS para preencher a barra de input
            progressBar.style.backgroundSize = percentVal + '% 100%';

            document.getElementById('progressPercent').textContent = Math.round(percent) + '%';

            // Centralizar no trem se estiver tocando
            if (isPlaying && currentZoomLevel !== 'globe' && currentZoomLevel !== 'satellite') {
                map.panTo([lat, lng], { animate: true, duration: 0.1 }); // Duration curto para seguir firme
            }

            updateTimeDisplay();
            checkScenery(lat);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            updatePlayButtonUI();
            
            if (isPlaying) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function updatePlayButtonUI() {
            // Atualiza Desktop
            const btnDesktop = document.getElementById('desktopPlayBtn');
            // Não existe botão de play mobile no HTML, pois o controle vertical é só velocidade.
            // Se quisermos um play mobile na coluna, precisaríamos adicionar, mas o foco foi velocidade vertical.
            // Assumindo que no mobile o usuário pode querer pausar, talvez devamos adicionar um botão play 
            // ao lado do vertical ou assumir que ele usa o menu. 
            // Vamos adicionar um botão de play pequeno acima do controle vertical para mobile.
            
            // Lógica de Ícone
            const iconClass = isPlaying ? 'fa-pause' : 'fa-play';
            const playingClass = isPlaying ? 'playing' : '';
            
            btnDesktop.innerHTML = `<i class="fas ${iconClass}"></i>`;
            if(isPlaying) btnDesktop.classList.add('playing');
            else btnDesktop.classList.remove('playing');

            // Mobile Play Button Logic (Vamos criar um dinamicamente se não existir, ou usar o do menu se preferir)
            // Como o usuário pediu especificamente a velocidade vertical abaixo do player, 
            // vamos garantir que o botão de play exista na coluna para mobile também.
            let mobileBtn = document.getElementById('mobileColPlayBtn');
            if(!mobileBtn) {
                // Injeta se não existir (para mobile)
                const controls = document.querySelector('.map-controls');
                const btn = document.createElement('button');
                btn.className = 'control-btn';
                btn.id = 'mobileColPlayBtn';
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.onclick = togglePlay;
                // Inserir antes do controle de velocidade
                const speedCtrl = document.querySelector('.mobile-speed-control');
                controls.insertBefore(btn, speedCtrl);
                mobileBtn = btn;
            }
            
            mobileBtn.innerHTML = `<i class="fas ${iconClass}"></i>`;
            if(isPlaying) {
                mobileBtn.style.background = '#ff4757';
                mobileBtn.style.color = '#fff';
            } else {
                mobileBtn.style.background = 'rgba(255, 255, 255, 0.95)';
                mobileBtn.style.color = '#1e3c72';
            }
        }

        function toggleContinuous() {
            isContinuous = !isContinuous;
            const btn = document.getElementById('continuousBtn');
            btn.style.background = isContinuous ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
            btn.style.color = isContinuous ? '#1e3c72' : '#fff';
        }

        function animate() {
            if (!isPlaying) return;
            const step = (currentSpeed / 3600) * 0.016; 
            currentPosition += step;
            elapsedTime += 0.016;

            if (currentPosition >= currentRoute.distance) {
                if (isContinuous) {
                    currentPosition = 0;
                    elapsedTime = 0;
                } else {
                    currentPosition = currentRoute.distance;
                    togglePlay();
                }
            }
            updateTrainVisuals();
            animationId = requestAnimationFrame(animate);
        }

        function updateTimeDisplay() {
            const remaining = currentRoute.distance - currentPosition;
            const hours = remaining / currentSpeed;
            const h = Math.floor(hours);
            const m = Math.floor((hours - h) * 60);
            document.getElementById('timeRemaining').textContent = `${h}h ${m}min`;
        }

        function jumpToPosition(percent) {
            currentPosition = currentRoute.distance * percent;
            updateTrainVisuals();
        }

        function checkScenery(lat) {
            if(!currentRoute.scenery) return;
            const scenery = currentRoute.scenery.find(s => Math.abs(s.lat - lat) < 0.5);
            const overlay = document.getElementById('sceneryOverlay');
            if (scenery && !overlay.classList.contains('show')) {
                document.getElementById('sceneryText').textContent = scenery.text;
                document.getElementById('sceneryIcon').className = 'fas ' + scenery.icon;
                overlay.classList.add('show');
                setTimeout(() => overlay.classList.remove('show'), 4000);
            }
        }

        // --- Controles de Mapa ---
        function changeZoom(direction) {
            if (direction === 'in') map.zoomIn(); else map.zoomOut();
            currentZoomLevel = 'route';
        }
        function resetView() {
            if (routeLine) map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
            currentZoomLevel = 'route';
        }
        function toggleSatellite() {
            const btn = document.getElementById('btnSatellite');
            if (map.hasLayer(satelliteLayer)) {
                map.removeLayer(satelliteLayer);
                btn.classList.remove('active');
                currentZoomLevel = 'route';
            } else {
                satelliteLayer.addTo(map);
                btn.classList.add('active');
                currentZoomLevel = 'satellite';
            }
        }
        function toggleCabin() {
            const btn = document.getElementById('btnCabin');
            if (currentZoomLevel === 'cabin') {
                resetView();
                btn.classList.remove('active');
            } else {
                map.setZoom(15);
                btn.classList.add('active');
                currentZoomLevel = 'cabin';
                const overlay = document.getElementById('sceneryOverlay');
                document.getElementById('sceneryText').textContent = 'Vista da Cabine';
                document.getElementById('sceneryIcon').className = 'fas fa-train';
                overlay.classList.add('show');
                setTimeout(() => overlay.classList.remove('show'), 3000);
            }
        }

        // --- Save/Load ---
        function saveTrip() {
            const tripData = {
                id: Date.now(),
                routeKey: currentRouteKey,
                position: currentPosition,
                speed: currentSpeed,
                date: new Date().toLocaleDateString('pt-BR')
            };
            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            savedTrips.push(tripData);
            localStorage.setItem('thaisaTrips', JSON.stringify(savedTrips));
            renderSavedTrips();
            const btn = document.querySelector('.control-group .btn-secondary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Salvo!';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        }
        function loadSavedTrip(id) {
            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            const trip = savedTrips.find(t => t.id === id);
            if (trip) {
                loadRoute(trip.routeKey, trip);
                toggleSidebar();
            }
        }
        function deleteTrip(id, event) {
            event.stopPropagation();
            if(!confirm('Apagar esta viagem?')) return;
            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            savedTrips = savedTrips.filter(t => t.id !== id);
            localStorage.setItem('thaisaTrips', JSON.stringify(savedTrips));
            renderSavedTrips();
        }
        function renderSavedTrips() {
            const list = document.getElementById('savedTripsList');
            const savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            list.innerHTML = '';
            if (savedTrips.length === 0) {
                list.innerHTML = '<div style="text-align:center; opacity:0.5; font-size:11px; padding:10px;">Nenhuma viagem salva</div>';
                return;
            }
            savedTrips.forEach(trip => {
                const routeName = routes[trip.routeKey].name;
                const percent = Math.round((trip.position / routes[trip.routeKey].distance) * 100);
                const card = document.createElement('div');
                card.className = 'trip-card';
                card.style.cssText = "background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--primary); cursor: pointer;";
                card.onclick = () => loadSavedTrip(trip.id);
                card.innerHTML = `
                    <div style="flex:1;">
                        <strong>${routeName}</strong>
                        <small style="display:block; color: rgba(255,255,255,0.5); font-size: 10px;">${percent}% • ${trip.date}</small>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-load" onclick="loadSavedTrip(${trip.id})" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fas fa-play"></i></button>
                        <button class="btn-delete" onclick="deleteTrip(${trip.id}, event)" style="background:none; border:none; color:#ff4757; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(card);
            });
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
