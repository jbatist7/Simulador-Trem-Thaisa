```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thaisa Travel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#ffd700;
--bg-dark:rgba(20,30,48,.92);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:sans-serif;
height:100dvh;
overflow:hidden;
background:#1e3c72;
}

/* MAPA */
#map{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
z-index:1;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
padding:12px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTROLES MAPA */
.map-controls{
position:fixed;
right:18px;
bottom:260px;
display:flex;
flex-direction:column;
gap:10px;
z-index:1000;
}

.control-btn{
width:44px;
height:44px;
border-radius:50%;
border:none;
cursor:pointer;
background:#fff;
}

/* BARRA */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--bg-dark);
backdrop-filter:blur(12px);
padding:12px 16px;
z-index:1100;
border-top:1px solid rgba(255,255,255,.15);
}

/* PROGRESSO */
.progress-track{
height:6px;
background:rgba(255,255,255,.2);
border-radius:6px;
overflow:hidden;
cursor:pointer;
}

.progress-fill{
height:100%;
background:var(--primary);
width:0;
}

/* GRID */
.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:10px;
margin-top:8px;
}

/* VELOCIDADE */
.speed-section{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

input[type=range]{flex:1}

/* MOBILE */
@media(max-width:600px){

.map-controls{
flex-direction:row;
bottom:270px;
right:10px;
}

.info-grid{
grid-template-columns:repeat(2,1fr);
}

.speed-section{
flex-wrap:wrap;
}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="map-controls">
<button class="control-btn" onclick="map.zoomIn()">+</button>
<button class="control-btn" onclick="map.zoomOut()">-</button>
<button class="control-btn" onclick="toggleSatellite()">Sat</button>
</div>

<div class="bottom-bar">

<div class="progress-track" id="progressBg">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="info-grid">
<div><b>Origem</b><br><span id="origin">Moscou</span></div>
<div><b>Destino</b><br><span id="dest">Vladivostok</span></div>
<div><b>Distância</b><br><span id="dist">9289 km</span></div>
</div>

<div class="speed-section">
<span id="speedValue">120</span> km/h
<input type="range" id="speed" min="40" max="800" value="120">
<button onclick="togglePlay()" id="play">▶</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map("map",{zoomControl:false}).setView([55,37],3);

let normal=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let satellite=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}");

let isSat=false;

function toggleSatellite(){
if(isSat){
map.removeLayer(satellite);
normal.addTo(map);
}else{
map.removeLayer(normal);
satellite.addTo(map);
}
isSat=!isSat;
}

/* SIMULAÇÃO */
let speed=120;
let pos=0;
let playing=false;

document.getElementById("speed").oninput=e=>{
speed=e.target.value;
document.getElementById("speedValue").textContent=speed;
};

function togglePlay(){
playing=!playing;
document.getElementById("play").textContent=playing?"⏸":"▶";
if(playing)animate();
}

function animate(){
if(!playing)return;
pos+=speed/50000;
document.getElementById("progressFill").style.width=(pos*100)+"%";
requestAnimationFrame(animate);
}
</script>

</body>
</html>
```
