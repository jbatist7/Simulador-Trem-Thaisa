<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça turismo por conta da Thaisa</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffd700;
            --primary-dark: #e6c200;
            --bg-dark: rgba(20, 30, 48, 0.85);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: #1e3c72;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none; /* Deixa clicar no mapa através do header vazio */
        }

        .header-content {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .logo span {
            color: var(--primary);
        }

        .menu-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: var(--primary);
            color: #000;
        }

        /* --- Map Container --- */
        #map {
            flex: 1;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- Bottom Info Bar (Mobile Friendly) --- */
        .bottom-bar {
            background: var(--bg-dark);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .weather-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        /* --- Sidebar (Settings Panel) --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: rgba(30, 40, 60, 0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            transition: right 0.3s ease-in-out;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Controls inside Sidebar */
        .control-group {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }

        .group-title {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Speed Slider */
        .speed-container {
            text-align: center;
        }

        .speed-display {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Play/Pause Big Button */
        .play-control {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-main {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-play {
            background: var(--primary);
            color: #1e3c72;
        }

        .btn-play.playing {
            background: #ff4757;
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Saved Trips */
        .saved-trips-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .trip-card {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--primary);
        }

        .trip-info small {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
        }

        .trip-actions button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 5px;
            margin-left: 5px;
        }

        .btn-load { color: var(--primary); }
        .btn-delete { color: #ff4757; }

        /* Select */
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* Overlay for progress */
        .progress-overlay {
            position: absolute;
            bottom: 140px; /* Above bottom bar */
            left: 20px;
            right: 20px;
            z-index: 900;
            pointer-events: none;
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .sidebar {
                width: 100%;
                right: -100%;
            }
            .bottom-bar {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .info-value {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                Thaisa <span>Travel</span>
            </div>
        </div>
        <div style="font-size: 12px; opacity: 0.8;" id="dateDisplay"></div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Progress Bar Overlay -->
    <div class="progress-overlay">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Bottom Info Bar -->
    <div class="bottom-bar">
        <div class="info-item">
            <span class="info-label">Origem</span>
            <span class="info-value" id="bottomOrigin">Moscou</span>
        </div>
        <div class="info-item">
            <span class="info-label">Destino</span>
            <span class="info-value" id="bottomDest">Vladivostok</span>
        </div>
        <div class="info-item">
            <span class="info-label">Distância</span>
            <span class="info-value" id="bottomDist">9.289 km</span>
        </div>
        <div class="info-item">
            <span class="info-label">Tempo Est.</span>
            <span class="info-value" id="bottomTime">7 dias</span>
        </div>
        <div class="info-item" style="justify-content: center;">
            <div class="weather-badge">
                <span id="bottomWeatherIcon">❄️</span>
                <div style="display:flex; flex-direction:column;">
                    <span id="bottomWeatherText" style="font-size:10px;">Neve</span>
                    <span id="bottomTemp" style="font-weight:bold;">-15°C</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Settings -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="font-family: 'Playfair Display';">Configurações</h2>
            <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Route Selection -->
        <div class="control-group">
            <div class="group-title"><i class="fas fa-map-marked-alt"></i> Escolher Rota</div>
            <select id="routeSelect">
                <optgroup label="🌏 Ásia">
                    <option value="trans-siberian">Trans-Siberiana (Rússia)</option>
                    <option value="shinkansen">Shinkansen (Japão)</option>
                </optgroup>
                <optgroup label="🌍 Europa">
                    <option value="orient-express">Orient Express (Europa)</option>
                    <option value="glacier-express">Glacier Express (Suíça)</option>
                </optgroup>
                <optgroup label="🌎 Américas">
                    <option value="california-zephyr">California Zephyr (EUA)</option>
                    <option value="canadian">The Canadian (Canadá)</option>
                    <option value="tren-a-la-nube">Tren a las Nubes (Argentina)</option>
                    <option value="serra-verde">Serra Verde (Brasil)</option>
                    <option value="tren-maya">Tren Maya (México)</option>
                </optgroup>
            </select>
        </div>

        <!-- Speed Control -->
        <div class="control-group">
            <div class="group-title"><i class="fas fa-tachometer-alt"></i> Velocidade</div>
            <div class="speed-container">
                <div class="speed-display"><span id="speedValue">120</span> <span style="font-size:14px">km/h</span></div>
                <input type="range" id="speedSlider" min="40" max="800" value="120" step="10">
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:5px; opacity:0.6;">
                    <span>Lento (40)</span>
                    <span>Rápido (800)</span>
                </div>
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="control-group">
            <div class="group-title"><i class="fas fa-play-circle"></i> Controle de Viagem</div>
            <div class="play-control">
                <button class="btn-main btn-play" id="playPauseBtn" onclick="togglePlay()">
                    <i class="fas fa-play"></i> Iniciar
                </button>
                <button class="btn-main btn-secondary" id="continuousBtn" onclick="toggleContinuous()">
                    <i class="fas fa-infinity"></i>
                </button>
            </div>
            <div style="margin-top:15px; font-size:12px; text-align:center; opacity:0.7;">
                Toque no mapa para mover o trem
            </div>
        </div>

        <!-- Save/Load System -->
        <div class="control-group">
            <div class="group-title"><i class="fas fa-save"></i> Minhas Viagens</div>
            <button class="btn-main btn-secondary" style="width:100%; margin-bottom:15px;" onclick="saveTrip()">
                <i class="fas fa-download"></i> Salvar Progresso Atual
            </button>
            
            <div class="saved-trips-list" id="savedTripsList">
                <!-- Lista preenchida via JS -->
                <div style="text-align:center; opacity:0.5; font-size:12px;">Nenhuma viagem salva</div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- Database de Rotas ---
        const routes = {
            'trans-siberian': {
                name: 'Trans-Siberiana', origin: 'Moscou', destination: 'Vladivostok',
                distance: 9289, duration: '7 dias',
                coordinates: [[55.7558, 37.6173], [57.6261, 39.8845], [56.8389, 60.6057], [55.0084, 82.9357], [52.2978, 104.2964], [43.1056, 131.8735]],
                weather: { icon: '❄️', text: 'Neve', temp: '-15°C' }
            },
            'shinkansen': {
                name: 'Shinkansen', origin: 'Tóquio', destination: 'Osaka',
                distance: 515, duration: '2h 30min',
                coordinates: [[35.6762, 139.6503], [35.4437, 139.6380], [35.1815, 136.9066], [34.6937, 135.5023]],
                weather: { icon: '🌸', text: 'Primavera', temp: '18°C' }
            },
            'orient-express': {
                name: 'Orient Express', origin: 'Paris', destination: 'Istambul',
                distance: 3000, duration: '3 dias',
                coordinates: [[48.8566, 2.3522], [47.3769, 8.5417], [48.2082, 16.3738], [41.0082, 28.9784]],
                weather: { icon: '🌤️', text: 'Nublado', temp: '12°C' }
            },
            'glacier-express': {
                name: 'Glacier Express', origin: 'Zermatt', destination: 'St. Moritz',
                distance: 291, duration: '8 horas',
                coordinates: [[46.0207, 7.7491], [46.6167, 8.3667], [46.6569, 9.8355]],
                weather: { icon: '⛷️', text: 'Neve', temp: '-5°C' }
            },
            'california-zephyr': {
                name: 'California Zephyr', origin: 'Chicago', destination: 'San Francisco',
                distance: 3924, duration: '3 dias',
                coordinates: [[41.8781, -87.6298], [39.7392, -104.9903], [40.7608, -111.8910], [37.7749, -122.4194]],
                weather: { icon: '☀️', text: 'Sol', temp: '22°C' }
            },
            'canadian': {
                name: 'The Canadian', origin: 'Toronto', destination: 'Vancouver',
                distance: 4466, duration: '4 dias',
                coordinates: [[43.6532, -79.3832], [49.8951, -97.1384], [51.0447, -114.0719], [49.2827, -123.1207]],
                weather: { icon: '🍁', text: 'Outono', temp: '8°C' }
            },
            'tren-a-la-nube': {
                name: 'Tren a las Nubes', origin: 'Salta', destination: 'San Antonio',
                distance: 434, duration: '15 horas',
                coordinates: [[-24.7859, -65.4117], [-24.2333, -66.3000], [-24.0833, -66.8333]],
                weather: { icon: '☀️', text: 'Céu Limpo', temp: '5°C' }
            },
            'serra-verde': {
                name: 'Serra Verde', origin: 'Curitiba', destination: 'Morretes',
                distance: 110, duration: '3 horas',
                coordinates: [[-25.4284, -49.2733], [-25.4500, -49.0500], [-25.5400, -48.7889]],
                weather: { icon: '🌧️', text: 'Chuva', temp: '16°C' }
            },
            'tren-maya': {
                name: 'Tren Maya', origin: 'Cancún', destination: 'Palenque',
                distance: 1500, duration: '8 horas',
                coordinates: [[21.1619, -86.8515], [20.9674, -89.5926], [18.5397, -92.4707]],
                weather: { icon: '🌴', text: 'Tropical', temp: '28°C' }
            }
        };

        // --- Variáveis de Estado ---
        let map, trainMarker, routeLine;
        let currentRouteKey = 'trans-siberian';
        let currentRoute = routes[currentRouteKey];
        let isPlaying = false;
        let isContinuous = false;
        let currentSpeed = 120;
        let currentPosition = 0; // km percorridos
        let animationId;

        // --- Inicialização ---
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            setupListeners();
            loadRoute('trans-siberian');
            updateDate();
            renderSavedTrips();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            
            // Controles de Zoom manuais no mapa
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        function setupListeners() {
            // Seletor de Rota
            document.getElementById('routeSelect').addEventListener('change', (e) => {
                loadRoute(e.target.value);
                // Fecha o menu no mobile após selecionar
                if(window.innerWidth < 600) toggleSidebar();
            });

            // Slider de Velocidade
            const slider = document.getElementById('speedSlider');
            slider.addEventListener('input', (e) => {
                currentSpeed = parseInt(e.target.value);
                document.getElementById('speedValue').textContent = currentSpeed;
            });

            // Clique no mapa para mover o trem
            map.on('click', (e) => {
                if(!currentRoute) return;
                // Lógica simplificada: move o trem para o ponto mais próximo da linha
                const point = e.latlng;
                // Apenas para efeito visual neste demo, move o marcador para onde clicou se estiver perto da rota
                // Em um app real, faríamos projeção na linha poligonal
                trainMarker.setLatLng(point);
            });
        }

        function loadRoute(key, savedData = null) {
            currentRouteKey = key;
            currentRoute = routes[key];
            
            // Se houver dados salvos, usa eles
            if (savedData) {
                currentPosition = savedData.position;
                currentSpeed = savedData.speed;
                document.getElementById('speedSlider').value = currentSpeed;
                document.getElementById('speedValue').textContent = currentSpeed;
            } else {
                currentPosition = 0;
            }

            // Atualizar UI Bottom Bar
            document.getElementById('bottomOrigin').textContent = currentRoute.origin;
            document.getElementById('bottomDest').textContent = currentRoute.destination;
            document.getElementById('bottomDist').textContent = currentRoute.distance.toLocaleString('pt-BR') + ' km';
            document.getElementById('bottomTime').textContent = currentRoute.duration;
            document.getElementById('bottomWeatherIcon').textContent = currentRoute.weather.icon;
            document.getElementById('bottomWeatherText').textContent = currentRoute.weather.text;
            document.getElementById('bottomTemp').textContent = currentRoute.weather.temp;

            // Atualizar Mapa
            if (routeLine) map.removeLayer(routeLine);
            if (trainMarker) map.removeLayer(trainMarker);

            const latlngs = currentRoute.coordinates;
            routeLine = L.polyline(latlngs, { color: '#ffd700', weight: 4, opacity: 0.8, dashArray: '10, 10' }).addTo(map);
            
            trainMarker = L.circleMarker(latlngs[0], {
                radius: 8, fillColor: '#ffd700', color: '#fff', weight: 2, fillOpacity: 1
            }).addTo(map);

            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
            updateTrainVisuals();
        }

        function updateTrainVisuals() {
            // Interpolação simples para encontrar a lat/lng baseada na % da distância
            const totalDist = currentRoute.distance;
            const percent = Math.min(currentPosition / totalDist, 1);
            
            // Encontrar segmento atual
            const coords = currentRoute.coordinates;
            let accumulatedDist = 0;
            let startIdx = 0;
            
            // Cálculo aproximado de distância entre pontos para interpolação
            // (Nota: Em produção usaria geolib para distância real entre pontos)
            for(let i=0; i<coords.length-1; i++) {
                // Estimativa grosseira de distância do segmento
                const d = map.distance(coords[i], coords[i+1]) / 1000; 
                if(accumulatedDist + d >= currentPosition) {
                    startIdx = i;
                    break;
                }
                accumulatedDist += d;
            }

            const p1 = coords[startIdx];
            const p2 = coords[Math.min(startIdx+1, coords.length-1)];
            
            // Interpolar posição dentro do segmento
            const segmentDist = map.distance(p1, p2) / 1000;
            const segmentProgress = (currentPosition - accumulatedDist) / segmentDist;
            
            const lat = p1[0] + (p2[0] - p1[0]) * Math.min(segmentProgress, 1);
            const lng = p1[1] + (p2[1] - p1[1]) * Math.min(segmentProgress, 1);

            trainMarker.setLatLng([lat, lng]);
            
            // Atualizar barra de progresso
            document.getElementById('progressFill').style.width = (percent * 100) + '%';

            // Atualizar tempo restante estimado
            const remainingKm = totalDist - currentPosition;
            const hoursLeft = remainingKm / currentSpeed;
            // Exibir no console ou num tooltip se desejar
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playPauseBtn');
            const icon = btn.querySelector('i');
            
            if (isPlaying) {
                btn.classList.add('playing');
                btn.innerHTML = '<i class="fas fa-pause"></i> Pausar';
                animate();
            } else {
                btn.classList.remove('playing');
                btn.innerHTML = '<i class="fas fa-play"></i> Continuar';
                cancelAnimationFrame(animationId);
            }
        }

        function toggleContinuous() {
            isContinuous = !isContinuous;
            const btn = document.getElementById('continuousBtn');
            btn.style.background = isContinuous ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
            btn.style.color = isContinuous ? '#1e3c72' : '#fff';
        }

        function animate() {
            if (!isPlaying) return;

            // Distância percorrida neste frame (km)
            // Speed (km/h) / 3600 (s) * 0.016 (ms do frame approx)
            const step = (currentSpeed / 3600) * 0.016; 
            
            currentPosition += step;

            if (currentPosition >= currentRoute.distance) {
                if (isContinuous) {
                    currentPosition = 0;
                } else {
                    currentPosition = currentRoute.distance;
                    togglePlay(); // Para no fim
                    alert("Viagem concluída! Que tal salvar ou escolher outra rota?");
                }
            }

            updateTrainVisuals();
            animationId = requestAnimationFrame(animate);
        }

        // --- Sistema de Salvar/Carregar ---
        function saveTrip() {
            const tripData = {
                id: Date.now(),
                routeKey: currentRouteKey,
                position: currentPosition,
                speed: currentSpeed,
                date: new Date().toLocaleDateString('pt-BR')
            };

            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            savedTrips.push(tripData);
            localStorage.setItem('thaisaTrips', JSON.stringify(savedTrips));
            
            renderSavedTrips();
            alert('Viagem salva com sucesso!');
        }

        function loadSavedTrip(id) {
            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            const trip = savedTrips.find(t => t.id === id);
            
            if (trip) {
                loadRoute(trip.routeKey, trip);
                toggleSidebar(); // Fecha menu
            }
        }

        function deleteTrip(id, event) {
            event.stopPropagation();
            if(!confirm('Tem certeza que deseja apagar esta viagem salva?')) return;

            let savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            savedTrips = savedTrips.filter(t => t.id !== id);
            localStorage.setItem('thaisaTrips', JSON.stringify(savedTrips));
            renderSavedTrips();
        }

        function renderSavedTrips() {
            const list = document.getElementById('savedTripsList');
            const savedTrips = JSON.parse(localStorage.getItem('thaisaTrips') || '[]');
            
            list.innerHTML = '';
            
            if (savedTrips.length === 0) {
                list.innerHTML = '<div style="text-align:center; opacity:0.5; font-size:12px; padding:10px;">Nenhuma viagem salva</div>';
                return;
            }

            savedTrips.forEach(trip => {
                const routeName = routes[trip.routeKey].name;
                const percent = Math.round((trip.position / routes[trip.routeKey].distance) * 100);
                
                const card = document.createElement('div');
                card.className = 'trip-card';
                card.onclick = () => loadSavedTrip(trip.id);
                card.innerHTML = `
                    <div class="trip-info" style="cursor:pointer; flex:1;">
                        <strong>${routeName}</strong>
                        <small>${percent}% concluído • ${trip.date}</small>
                    </div>
                    <div class="trip-actions">
                        <button class="btn-load" onclick="loadSavedTrip(${trip.id})"><i class="fas fa-play"></i></button>
                        <button class="btn-delete" onclick="deleteTrip(${trip.id}, event)"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('pt-BR', options);
        }
    </script>
</body>
</html>
